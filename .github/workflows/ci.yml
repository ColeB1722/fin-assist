name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: devenv
      - run: nix profile install --inputs-from . 'nixpkgs#devenv'
      - run: devenv ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: devenv
      - run: nix profile install --inputs-from . 'nixpkgs#devenv'
      - run: |
          devenv shell -- bash -c "
            uv sync --all-extras
            ruff check src/
          "

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: devenv
      - run: nix profile install --inputs-from . 'nixpkgs#devenv'
      - run: |
          devenv shell -- bash -c "
            uv sync --all-extras
            pytest tests/ -x --tb=short
          "
