name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Each job invokes a `just` recipe so the justfile remains the single source of
# truth for what runs in CI. Adding a step to `just ci` automatically extends
# CI — no YAML changes required. See AGENTS.md § Commands.
#
# Required-check architecture (see docs/decisions.md § CI required checks):
#
# The ruleset on `main` requires a SINGLE check — `ci-required` — which
# aggregates the result of all upstream jobs via the "skipped = success"
# semantics GitHub uses for required checks. This avoids the well-known
# `paths-ignore` deadlock (workflow skipped = check never reports = PR
# unmergeable) without needing duplicate "skip" workflows or per-job path
# filtering. When new jobs are added below, add them to `ci-required.needs`
# and they're automatically covered.

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: nix shell nixpkgs#just nixpkgs#treefmt nixpkgs#nixfmt-rfc-style nixpkgs#ruff --command just check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: |
          nix shell nixpkgs#just nixpkgs#uv nixpkgs#ruff --command bash -c "
            uv sync --all-extras
            just lint
            just lint-imports
          "

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: |
          nix shell nixpkgs#just nixpkgs#uv --command bash -c "
            uv sync --all-extras
            just typecheck
          "

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: |
          nix shell nixpkgs#just nixpkgs#uv --command bash -c "
            uv sync --all-extras
            just test -x --tb=short
          "

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Install just
        run: choco install just --yes
      - run: uv sync --all-groups
      - run: just test

  # Single aggregation job referenced as the only required status check in the
  # `main` branch ruleset. Uses GitHub Actions' "skipped = success" semantics:
  # this job only runs (and fails) when any upstream job failed or was
  # cancelled.  When all upstream jobs succeed (or are skipped, e.g. by path
  # filtering in the future), this job is skipped — and skipped jobs count as
  # success for required-check purposes.
  #
  # See https://devopsdirective.com/posts/2025/08/github-actions-required-checks-for-conditional-jobs/
  # for the pattern.  Add new jobs to `needs` below as they're introduced.
  ci-required:
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, test, test-windows]
    if: ${{ cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure') }}
    steps:
      - name: Fail if any required upstream job failed or was cancelled
        run: |
          echo "::error::One or more required CI jobs failed or were cancelled."
          echo "format=${{ needs.format.result }}"
          echo "lint=${{ needs.lint.result }}"
          echo "typecheck=${{ needs.typecheck.result }}"
          echo "test=${{ needs.test.result }}"
          echo "test-windows=${{ needs.test-windows.result }}"
          exit 1
